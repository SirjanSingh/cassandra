<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cassandra - the agent that watches agents</title>
<style>
  :root { --bg:#0a0e14; --panel:#121822; --line:#1f2a3a; --txt:#e6edf3;
          --mut:#7d8da3; --ok:#3fb950; --bad:#f85149; --acc:#58a6ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--txt);
         font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { padding:18px 24px; border-bottom:1px solid var(--line);
           display:flex; align-items:baseline; gap:14px; }
  header h1 { font-size:18px; letter-spacing:.5px; }
  header span { color:var(--mut); font-size:12px; }
  .wrap { display:grid; grid-template-columns:360px 1fr; height:calc(100vh - 59px); }
  .ask { padding:20px; border-right:1px solid var(--line); }
  .ask textarea { width:100%; height:90px; background:var(--panel);
    color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:10px; }
  .ask button { margin-top:10px; width:100%; padding:10px; background:var(--acc);
    border:0; border-radius:8px; color:#001; font-weight:700; cursor:pointer; }
  .reply { margin-top:16px; padding:12px; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; white-space:pre-wrap;
    color:var(--mut); min-height:60px; }
  .feed { overflow-y:auto; padding:20px; }
  .card { border:1px solid var(--line); border-left:3px solid var(--acc);
    background:var(--panel); border-radius:8px; padding:14px 16px; margin-bottom:12px;
    animation:in .35s ease; }
  .card.diagnosed { border-left-color:var(--bad); }
  .card.patched   { border-left-color:var(--ok); }
  .card.alert     { box-shadow:0 0 0 1px var(--bad), 0 0 24px rgba(248,81,73,.35);
                    animation:flash 1s ease; }
  .card h3 { font-size:14px; margin-bottom:4px; }
  .card .meta { color:var(--mut); font-size:12px; }
  .card a { color:var(--acc); font-size:12px; text-decoration:none; }
  .card pre { margin-top:8px; padding:10px; background:#0d1117;
    border:1px solid var(--line); border-radius:6px; overflow-x:auto;
    font-size:12px; white-space:pre-wrap; }
  .stage { font-size:10px; text-transform:uppercase; letter-spacing:1px;
    color:var(--mut); }
  .card.root_caused { border-left-color:#d29922; }
  .card.replayed { border-left-color:#a371f7; }
  .card.red_teamed { border-left-color:#db61a2; }
  /* colored prompt diff viewer */
  .diff { margin-top:8px; border:1px solid var(--line); border-radius:6px;
    overflow:hidden; font-size:12px; }
  .diff div { padding:1px 10px; white-space:pre-wrap; }
  .diff .add { background:rgba(63,185,80,.14); color:#56d364; }
  .diff .del { background:rgba(248,81,73,.14); color:#f85149; }
  .diff .hd  { background:#10213a; color:#58a6ff; }
  .chain { margin:8px 0 0; padding-left:18px; color:var(--mut); font-size:12px; }
  .chain li::marker { color:var(--acc); }
  .ba { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
  .ba div { padding:10px; border:1px solid var(--line); border-radius:6px;
    background:#0d1117; font-size:12px; white-space:pre-wrap; }
  .ba .b { border-left:3px solid var(--bad); }
  .ba .a { border-left:3px solid var(--ok); }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px;
    font-size:10px; font-weight:700; letter-spacing:1px; }
  .badge.ok { background:rgba(63,185,80,.2); color:#56d364; }
  .badge.bad { background:rgba(248,81,73,.2); color:#f85149; }
  table.rt { width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
  table.rt td,table.rt th { border:1px solid var(--line); padding:4px 8px;
    text-align:left; }
  @keyframes in { from{opacity:0;transform:translateY(6px)} to{opacity:1} }
  @keyframes flash { 0%{background:#3b1416} 100%{background:var(--panel)} }
</style>
</head>
<body>
<header>
  <h1>CASSANDRA</h1><span>the meta-agent that watches other agents - Arize / Phoenix</span>
</header>
<div class="wrap">
  <div class="ask">
    <div class="stage">Drive the Patient (ShopBot)</div>
    <textarea id="msg">Hi, what's your refund window for orders shipped to Germany?</textarea>
    <button onclick="ask()">Send customer message</button>
    <div class="reply" id="reply">- awaiting -</div>
  </div>
  <div class="feed" id="feed"></div>
</div>
<script>
const feed = document.getElementById('feed');
async function ask() {
  document.getElementById('reply').textContent = '...';
  const message = document.getElementById('msg').value;
  const r = await fetch('/ask', {method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message})});
  const j = await r.json();
  document.getElementById('reply').textContent = j.reply || JSON.stringify(j);
}
const esc = s => (s||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

function diffView(text){
  const rows = esc(text).split('\n').map(l => {
    let cls = '';
    if (l.startsWith('+') && !l.startsWith('+++')) cls = 'add';
    else if (l.startsWith('-') && !l.startsWith('---')) cls = 'del';
    else if (l.startsWith('@@') || l.startsWith('+++') || l.startsWith('---')) cls = 'hd';
    return `<div class="${cls}">${l || ' '}</div>`;
  }).join('');
  return `<div class="diff">${rows}</div>`;
}

function extra(ev){
  const p = ev.payload || {};
  if (ev.stage === 'patched' && p.diff) return diffView(p.diff);
  if (ev.stage === 'root_caused'){
    const chain = (p.causal_chain||[]).map(s=>`<li>${esc(s)}</li>`).join('');
    return `<ul class="chain">${chain}</ul>` +
      (p.fix_strategy?`<div class="meta">Fix strategy: ${esc(p.fix_strategy)}</div>`:'');
  }
  if (ev.stage === 'replayed'){
    const b = `<span class="badge ${p.fixed?'ok':'bad'}">${p.fixed?'FIXED':'STILL BROKEN'}</span>`;
    return `${b}<div class="ba"><div class="b">BEFORE\n\n${esc(p.before)}</div>`+
      `<div class="a">AFTER\n\n${esc(p.after)}</div></div>`;
  }
  if (ev.stage === 'red_teamed'){
    const r = (p.rows||[]).map(x=>`<tr><td>${esc(x.attack)}</td>`+
      `<td>${x.before_pass?'PASS':'FAIL'}</td><td>${x.after_pass?'PASS':'FAIL'}</td></tr>`).join('');
    return `<table class="rt"><tr><th>attack</th><th>current</th><th>patched</th></tr>${r}</table>`;
  }
  return '';
}

const es = new EventSource('/events');
es.addEventListener('pipeline', e => {
  const ev = JSON.parse(e.data);
  const c = document.createElement('div');
  c.className = 'card ' + ev.stage + (ev.stage === 'diagnosed' ? ' alert' : '');
  const link = ev.phoenix_url
    ? `<div><a href="${ev.phoenix_url}" target="_blank">open in Phoenix &rarr;</a></div>` : '';
  c.innerHTML = `<div class="stage">${ev.stage} &middot; ${ev.incident_id}</div>
    <h3>${esc(ev.title)}</h3><div class="meta">${esc(ev.detail)}</div>${link}${extra(ev)}`;
  feed.prepend(c);
});
</script>
</body>
</html>
